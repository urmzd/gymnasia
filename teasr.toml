[output]
dir = "./showcase"

[[output.formats]]
output_type = "png"

[font]
family = "MonaspiceNe Nerd Font"

[[scenes]]
type = "terminal"
name = "cartpole-headless"
theme = "dracula"
cwd = "."
cols = 100
rows = 40

[[scenes.interactions]]
type = "type"
text = "cargo run --example=cartpole_headless --no-default-features 2>&1"
speed = 50
[[scenes.interactions]]
type = "key"
key = "enter"
[[scenes.interactions]]
type = "wait"
duration = 60000
