[output]
dir = "./showcase"

[[output.formats]]
output_type = "png"

[font]
family = "MonaspiceNe Nerd Font"

[[scenes]]
type = "terminal"
name = "cartpole-headless"
theme = "dracula"
cwd = "."
cols = 100
rows = 40

[[scenes.interactions]]
type = "type"
text = "cargo run --example=cartpole_headless 2>&1"
speed = 50
[[scenes.interactions]]
type = "key"
key = "enter"
[[scenes.interactions]]
type = "wait"
duration = 60000

[[scenes]]
type = "screen"
name = "cartpole"
setup = "cargo run --example=cartpole --features render &"
delay = 5000
theme = "dracula"
title = "CartPole"

[[scenes.interactions]]
type = "wait"
duration = 2000
[[scenes.interactions]]
type = "snapshot"

[[scenes]]
type = "screen"
name = "mountain-car"
setup = "cargo run --example=mountain_car --features render &"
delay = 5000
theme = "dracula"
title = "MountainCar"

[[scenes.interactions]]
type = "wait"
duration = 2000
[[scenes.interactions]]
type = "snapshot"
